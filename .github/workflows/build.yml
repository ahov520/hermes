name: Android APK

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # android/ 目录不入库（见 .gitignore），由当前 stable 模板现场生成，
      # 保证 Gradle / AGP / Kotlin 版本始终与 Flutter 匹配。
      # flutter create 不会覆盖已存在的 lib/、test/、pubspec.yaml 等文件。
      - name: Generate Android scaffolding
        run: flutter create --platforms android --project-name hermes_mobile .

      # 生成的 main/AndroidManifest.xml 默认没有 INTERNET 权限（release 构建必需），
      # 且 Android 9+ 默认禁止明文 HTTP（局域网 http:// 连接必需）。
      # POST_NOTIFICATIONS 是 Android 13+ 推送通知必需。
      - name: Patch AndroidManifest (permissions + cleartext)
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|&\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>|' "$MANIFEST"
          sed -i 's|<application|<application android:usesCleartextTraffic="true"|' "$MANIFEST"
          grep -q 'android.permission.INTERNET' "$MANIFEST"
          grep -q 'android.permission.POST_NOTIFICATIONS' "$MANIFEST"
          grep -q 'usesCleartextTraffic' "$MANIFEST"

      # flutter_local_notifications 17+ 需要 core library desugaring。
      # flutter create 生成的 Kotlin DSL 模板默认没有这些配置，在此注入。
      - name: Patch Android Gradle (desugaring for notifications)
        run: |
          APP_GRADLE=android/app/build.gradle.kts
          test -f "$APP_GRADLE"
          python3 - <<'PY'
          from pathlib import Path
          p = Path("android/app/build.gradle.kts")
          text = p.read_text(encoding="utf-8")
          if "isCoreLibraryDesugaringEnabled" not in text:
              old = """    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }"""
              new = """    compileOptions {
        isCoreLibraryDesugaringEnabled = true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }"""
              if old not in text:
                  raise SystemExit(f"unexpected compileOptions block in {p}")
              text = text.replace(old, new, 1)
          if "multiDexEnabled" not in text:
              old = """    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId ="""
              new = """    defaultConfig {
        multiDexEnabled = true
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId ="""
              if old not in text:
                  # looser fallback: inject after defaultConfig {
                  marker = "    defaultConfig {"
                  if marker not in text:
                      raise SystemExit(f"defaultConfig block not found in {p}")
                  text = text.replace(
                      marker,
                      marker + "\n        multiDexEnabled = true",
                      1,
                  )
              else:
                  text = text.replace(old, new, 1)
          dep_block = """
dependencies {
    coreLibraryDesugaring(\"com.android.tools:desugar_jdk_libs:2.1.4\")
}
"""
          if "desugar_jdk_libs" not in text:
              text = text.rstrip() + "\n" + dep_block
          p.write_text(text, encoding="utf-8")
          print(p.read_text(encoding="utf-8"))
          PY
          grep -q 'isCoreLibraryDesugaringEnabled' "$APP_GRADLE"
          grep -q 'desugar_jdk_libs' "$APP_GRADLE"

      - name: flutter pub get
        run: flutter pub get

      - name: Analyze (errors only)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-mobile-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
