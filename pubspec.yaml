name: hermes_mobile
description: Hermes Agent 移动客户端 — 连接本地 Hermes 网关 API 的手机应用
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_markdown: ^0.7.4
  image_picker: ^1.1.2
  # 16.3.x 在新版 Android SDK 上 bigLargeIcon(null) 编译失败；17.2.1+ 已修复。
  # 17+ 需要 android 侧 core library desugaring（CI 在 build.yml 里注入）。
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
