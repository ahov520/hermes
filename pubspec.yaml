name: hermes_mobile
description: Hermes Agent 移动客户端 — 连接本地 Hermes 网关 API 的手机应用
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_markdown: ^0.7.4
  image_picker: ^1.1.2
  # 17+ 需要 core library desugaring 配置，16.x 对即时通知足够且零额外配置
  flutter_local_notifications: ^16.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
