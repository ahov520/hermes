name: hermes_mobile
description: Hermes Agent 移动客户端 — 连接本地 Hermes 网关 API 的手机应用
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_markdown: ^0.7.4
  image_picker: ^1.1.2
  # 16.3.x 在新版 Android SDK 上 bigLargeIcon(null) 编译失败；17.2.1+ 已修复。
  # 17+ 需要 android 侧 core library desugaring（CI 在 build.yml 里注入）。
  flutter_local_notifications: ^17.2.4
  # Hermes Studio 聊天流式走 Socket.IO（非 SSE）
  socket_io_client: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

# 启动图标（CI 中 dart run flutter_launcher_icons 生成）
flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon.png
  adaptive_icon_background: '#FFFFFF'
  adaptive_icon_foreground: assets/icon.png

# 原生启动屏（CI 中 dart run flutter_native_splash:create 生成）
flutter_native_splash:
  color: '#FFFFFF'
  image: assets/icon.png
  android: true
  ios: false
